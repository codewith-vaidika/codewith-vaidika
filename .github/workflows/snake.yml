name: Generate Snake Animation

on:
  schedule:
    # Runs once a day at 00:00 UTC — keeps the "game" fresh with new contributions
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main              # regenerates whenever you push to main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate contribution snake SVG/GIF
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: codewith-vaidika
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=%236C63FF&color_dots=%2321262d,%230e4429,%23006d32,%2326a641,%2339d353

      - name: Push output to "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
